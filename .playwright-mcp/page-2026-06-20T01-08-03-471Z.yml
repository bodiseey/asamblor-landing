        - generic [ref=e30]: WHY THIS AUDIENCE IS HARD TO REACH
        - heading "Three reasons your acquisition stalls." [level=2] [ref=e31]:
          - text: Three reasons
          - generic [ref=e32]: your acquisition stalls.
      - generic [ref=e34]:
        - generic [ref=e35]:
          - generic [ref=e36]: PROBLEM 01
          - generic [ref=e37]: First-90-day cash-flow gap is invisible
          - generic [ref=e38]: An owner-op activates an MC, hauls their first 3 loads, then waits 45 days for the first broker check. By week 6 they're behind on fuel and the truck payment. That's the conversation factoring should be in — and it's almost always too late.
        - generic [ref=e39]:
          - generic [ref=e40]: PROBLEM 02
          - generic [ref=e41]: Recourse vs. non-recourse needs different audiences
          - generic [ref=e42]: Recourse factoring fits established owner-ops with good freight; non-recourse fits new MCs with broker-credit risk. Without segmentation, your sales team pitches the wrong product to half the leads.
        - generic [ref=e43]:
          - generic [ref=e44]: PROBLEM 03
          - generic [ref=e45]: Lost accounts go to whoever is in front of them
          - generic [ref=e46]: When a carrier outgrows or sours on a factor, the next factor with a clean pitch wins. Without a constant top-of-funnel of new MCs, you lose more than you gain every quarter.
    - generic [ref=e47]:
