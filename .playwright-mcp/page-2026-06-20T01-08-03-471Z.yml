          - generic [ref=e58]: Single-truck owner-ops need cash-flow positioning; 5–15 truck small fleets need same-day funding + fuel-advance integration. Different sequences, same database.
        - generic [ref=e59]:
          - generic [ref=e60]: Fuel-card + factoring bundle ready
          - generic [ref=e61]: Once a carrier signs your factoring, the same engine can promote fuel cards, dispatch services, and insurance partnerships — a multi-product CRM motion without rebuilding outbound for each.
        - generic [ref=e62]:
