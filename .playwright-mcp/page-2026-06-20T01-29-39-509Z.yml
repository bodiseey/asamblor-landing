      - generic [ref=e21]: For freight factoring companies
      - heading "Hit new MCs and small fleets—the week their cash flow gets tight." [level=1] [ref=e22]
      - paragraph [ref=e23]: Owner-ops on net-30 to net-90 broker terms hit a cash wall by week 6. Factoring isn't sold — it's positioned at the right moment. Asamblor reaches that moment, every week.
