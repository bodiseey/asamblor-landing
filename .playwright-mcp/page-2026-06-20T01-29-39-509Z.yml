    - generic [ref=e29]:
      - generic [ref=e30]:
        - generic [ref=e31]: WHY THIS AUDIENCE IS HARD TO REACH
        - heading "Three reasons your acquisition stalls." [level=2] [ref=e32]:
          - text: Three reasons
          - generic [ref=e33]: your acquisition stalls.
      - generic [ref=e35]:
        - generic [ref=e36]:
          - generic [ref=e37]: PROBLEM 01
          - generic [ref=e38]: First-90-day cash-flow gap is invisible
          - generic [ref=e39]: An owner-op activates an MC, hauls their first 3 loads, then waits 45 days for the first broker check. By week 6 they're behind on fuel and the truck payment. That's the conversation factoring should be in — and it's almost always too late.
        - generic [ref=e40]:
          - generic [ref=e41]: PROBLEM 02
          - generic [ref=e42]: Recourse vs. non-recourse needs different audiences
          - generic [ref=e43]: Recourse factoring fits established owner-ops with good freight; non-recourse fits new MCs with broker-credit risk. Without segmentation, your sales team pitches the wrong product to half the leads.
        - generic [ref=e44]:
          - generic [ref=e45]: PROBLEM 03
          - generic [ref=e46]: Lost accounts go to whoever is in front of them
          - generic [ref=e47]: When a carrier outgrows or sours on a factor, the next factor with a clean pitch wins. Without a constant top-of-funnel of new MCs, you lose more than you gain every quarter.
    - generic [ref=e48]:
      - generic [ref=e49]:
        - generic [ref=e50]: WHY ASAMBLOR FOR FACTORING COMPANIES
        - heading "The same engine tuned for your ICP." [level=2] [ref=e51]
      - generic [ref=e53]:
        - generic [ref=e54]:
          - generic [ref=e55]: New-MC trigger (first 14–60 days)
          - generic [ref=e56]: Pull a rolling list of authorities activated in the last 14, 30, or 60 days — your highest-intent factoring leads, before your competitors get there.
        - generic [ref=e57]:
          - generic [ref=e58]: Owner-op vs. small fleet segmentation
          - generic [ref=e59]: Single-truck owner-ops need cash-flow positioning; 5–15 truck small fleets need same-day funding + fuel-advance integration. Different sequences, same database.
        - generic [ref=e60]:
          - generic [ref=e61]: Fuel-card + factoring bundle ready
          - generic [ref=e62]: Once a carrier signs your factoring, the same engine can promote fuel cards, dispatch services, and insurance partnerships — a multi-product CRM motion without rebuilding outbound for each.
        - generic [ref=e63]:
          - generic [ref=e64]: Suppression of competitor customers
          - generic [ref=e65]: If you have a list of carriers already factoring with you, we apply that as a global suppression — no cannibalization, no duplicate outreach.
