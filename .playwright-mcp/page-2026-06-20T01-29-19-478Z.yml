    - generic [ref=e50]:
      - generic [ref=e51]: Why factoring companies in Texas is hard
      - heading "Three reasons your acquisition stalls in TX." [level=2] [ref=e52]:
        - text: Three reasons
        - generic [ref=e53]: your acquisition stalls in TX.
      - generic [ref=e54]:
        - generic [ref=e55]:
          - generic [ref=e56]: PROBLEM 01
          - generic [ref=e57]: First-90-day cash-flow gap is invisible
          - generic [ref=e58]: An owner-op activates an MC, hauls their first 3 loads, then waits 45 days for the first broker check. By week 6 they're behind on fuel and the truck payment. That's the conversation factoring should be in — and it's almost always too late.
        - generic [ref=e59]:
          - generic [ref=e60]: PROBLEM 02
          - generic [ref=e61]: Recourse vs. non-recourse needs different audiences
          - generic [ref=e62]: Recourse factoring fits established owner-ops with good freight; non-recourse fits new MCs with broker-credit risk. Without segmentation, your sales team pitches the wrong product to half the leads.
        - generic [ref=e63]:
          - generic [ref=e64]: PROBLEM 03
          - generic [ref=e65]: Lost accounts go to whoever is in front of them
          - generic [ref=e66]: When a carrier outgrows or sours on a factor, the next factor with a clean pitch wins. Without a constant top-of-funnel of new MCs, you lose more than you gain every quarter.
