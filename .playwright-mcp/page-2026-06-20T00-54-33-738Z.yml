      - heading "10 Term, suspension & termination" [level=2] [ref=e98]:
        - generic [ref=e99]: "10"
        - text: Term, suspension & termination
      - paragraph [ref=e100]: These Terms remain in effect for the term stated in the applicable Order. Either party may terminate for the other party's material breach if the breach is not cured within thirty (30) days of written notice. We may suspend or terminate immediately for non-payment, security or abuse incidents, or where required by law.
