      - paragraph [ref=e73]: "You may not, and may not permit any third party to: (a) reverse engineer, decompile, or copy the Services other than as expressly permitted; (b) interfere with or disrupt the integrity or performance of the Services; (c) use the Services to send unsolicited bulk communications in violation of applicable law; (d) misrepresent the source or identity of any message sent through the Services; or (e) access the Services to build a competing product."
    - generic [ref=e74]:
      - heading "07 Data & ownership" [level=2] [ref=e75]:
        - generic [ref=e76]: "07"
        - text: Data & ownership
      - heading "Client Data" [level=3] [ref=e77]
      - paragraph [ref=e78]:
        - text: As between the parties, you own all data you upload, provide, or that is generated specifically for your pipelines (including leads qualified for you, vetting-form submissions, and historical CRM records associated with your pipelines) (“
        - strong [ref=e79]: Client Data
        - text: ”). You grant us a non-exclusive, worldwide, royalty-free license to use Client Data solely to provide and improve the Services for you.
      - heading "Infrastructure you may retain" [level=3] [ref=e80]
      - paragraph [ref=e81]: "Subject to payment of all amounts due, upon termination you may retain ownership and operational control of: sending domains we registered in your name; CRM pipelines and forms built within your CRM tenant; and the historical lead database accumulated during the engagement. Mailboxes, third-party service subscriptions, and telephony registrations remain governed by the underlying provider's terms and may transfer subject to those providers' processes."
      - heading "Our Intellectual Property" [level=3] [ref=e82]
      - paragraph [ref=e83]: We retain all right, title, and interest in and to the Services, the CarrieX platform, our proprietary data pipelines, software, models, workflows, playbooks, and any improvements thereto. The CarrieX dataset itself (as a whole and as updated) is licensed, not sold; your right to use CarrieX-derived contact data is limited to operating your own outbound pipelines during the engagement and any post-termination period expressly granted.
      - heading "Feedback" [level=3] [ref=e84]
      - paragraph [ref=e85]: If you give us feedback or suggestions, you grant us a perpetual, irrevocable, royalty-free license to use it without restriction.
      - heading "Aggregated & anonymized data" [level=3] [ref=e86]
      - paragraph [ref=e87]: We may collect and use aggregated and anonymized data derived from the operation of the Services, provided such data does not identify you or any individual.
