        - generic [ref=e40]: "02"
        - text: The Services
      - paragraph [ref=e41]: "Asamblor is a done-for-you acquisition infrastructure for trucking carriers. Depending on the engagement, the Services may include: ICP onboarding; data extraction from the CarrieX platform; provisioning of sending domains, mailboxes, telephony, and SMS infrastructure; CRM pipeline build; outbound campaign execution; vetting forms; team notification automations; and ongoing optimization."
      - paragraph [ref=e42]:
        - text: Specific scope, deliverables, fees, term length, and any service-level commitments will be set out in an order form, statement of work, or proposal accepted by both parties (“
        - strong [ref=e43]: Order
        - text: ”). If an Order conflicts with these Terms, the Order controls for the conflicting subject only.
