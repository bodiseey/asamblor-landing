        - listitem [ref=e66]: Maintain proper consents, suppression lists, and DNC compliance where applicable, and process opt-out requests promptly. Reasonable suppression of STOP / unsubscribe requests is honored automatically across the platform.
        - listitem [ref=e67]: "Refrain from using the Services for prohibited content, including but not limited to: deceptive headers or subject lines, illegal goods or services, adult content, content that infringes third-party rights, malware, or any content that violates applicable law."
