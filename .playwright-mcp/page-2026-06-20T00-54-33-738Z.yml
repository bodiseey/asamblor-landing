        - listitem [ref=e64]: Comply with all laws and regulations applicable to your outbound, including the CAN-SPAM Act, the Telephone Consumer Protection Act (TCPA), 10DLC requirements, applicable state telemarketing and Do-Not-Call laws, CCPA/CPRA, and similar state and federal laws.
