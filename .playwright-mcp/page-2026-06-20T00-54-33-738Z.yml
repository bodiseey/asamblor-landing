        - text: Eligibility
      - paragraph [ref=e37]: The Services are intended only for businesses and their authorized representatives. You represent that you are at least 18 years old, are authorized to bind the entity you represent, and that your use of the Services complies with all laws and regulations applicable to your business.
    - generic [ref=e38]:
