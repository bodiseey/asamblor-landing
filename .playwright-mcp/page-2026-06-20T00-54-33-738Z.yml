      - paragraph [ref=e96]: Each party may receive non-public information of the other (“Confidential Information”). The receiving party will use the same degree of care it uses to protect its own confidential information (and no less than reasonable care), will use Confidential Information only to perform under these Terms, and will limit access to personnel with a need to know who are bound by confidentiality obligations. Confidentiality obligations survive termination for three (3) years, except for trade secrets, which survive as long as they remain trade secrets under applicable law.
